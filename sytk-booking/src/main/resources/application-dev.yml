spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://sytk-db:5432/sytk_dev}
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:sytk-redis}
      port: 6379

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: info
