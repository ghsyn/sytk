language: ko-KR
enable_free_tier: true

reviews:
  profile: chill
  request_changes_workflow: false

  high_level_summary: true
  high_level_summary_placeholder: '@coderabbitai summary'
  auto_title_placeholder: '@coderabbitai title'
  auto_title_instructions: >
    PR titles must follow the format: "[TYPE] Core Description in Korean". 
    TYPE: FEAT, FIX, DOCS, STYLE, REFACTOR, TEST, CHORE.
    Example: "[FEAT] 핵심 비즈니스 도메인 모델링"

  review_status: true
  review_details: false

  poem: false
  enable_prompt_for_ai_agents: false

  collapse_walkthrough: false
  changed_files_summary: false
  sequence_diagrams: true
  estimate_code_review_effort: false

  assess_linked_issues: true
  related_issues: true
  related_prs: true

  suggested_labels: false
  auto_apply_labels: true
  labeling_instructions:
    - label: "bug"
      instructions: "Assign this label for bug fixes and error corrections."
    - label: "feature"
      instructions: "Assign this label for new features and functional enhancements."
    - label: "refactor"
      instructions: "Assign this label for code refactoring without business logic changes."
    - label: "documentation"
      instructions: "Assign this label for changes to documentation or README files."
    - label: "performance"
      instructions: "Assign this label for performance optimizations."
    - label: "domain-logic"
      instructions: "Assign this label for critical changes within the domain entity layer."

  suggested_reviewers: true
  auto_assign_reviewers: false

  path_instructions:
    - path: "**/*Controller*(V[0-9]*)?.java"
      instructions: >
        Review API endpoints based on RESTful principles:
        1. Richardson Maturity Model (RMM): Aim for Level 2 (HTTP Methods) at minimum.
        2. URI Naming: Use kebab-case for paths and plural nouns for resources (e.g., /api/v1/concerts).
        3. Statelessness: Ensure no session state is maintained; use token-based auth.
        4. Abstraction: URIs should reflect resources, not 1:1 database table mappings.
        5. Structure: Use camelCase for request/response bodies and parameters.

    - path: "**/service/**/*Service.java"
      instructions: >
        This is the Application Service layer. Focus on:
        1. Preventing 'Fat Service': Check if business logic (validation, calculation, state transitions) is leaking into this layer.
        2. Flow Control: Services should only orchestrate the flow (fetch from repo -> call domain method -> save to repo).
        3. Encapsulation: Identify direct field manipulations (e.g., setters) and suggest using domain entity methods instead to maintain a 'Rich Domain Model'.

    - path: "**/domain/**/*.java"
      instructions: >
        This is the Domain Entity layer. Focus on:
        1. Rich Domain Model: Ensure entities encapsulate their own state and business rules.
        2. Data Integrity: Check for proper validation logic within the entity.
        3. Access Control: Ensure fields are properly encapsulated and not exposed via unnecessary setters.
  path_filters:
    - "!**/README.md"
    - "!**/build/**"
    - "!**/out/**"
    - "!.gradle/**"
    - "!**/*.DS_Store"
  abort_on_close: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords: []
    labels: []
    drafts: false
    base_branches: []

  tools:
    shellcheck: { enabled: true }
    ruff: { enabled: true }
    markdownlint: { enabled: true }
    github-checks: { enabled: true, timeout_ms: 90000 }
    biome: { enabled: true }
    hadolint: { enabled: true }
    yamllint: { enabled: true }
    gitleaks: { enabled: true }
    checkov: { enabled: true }
    ast-grep: { essential_rules: true }

chat:
  auto_reply: true

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - ".github/development_conventions.md"
      - ".github/pull_request_template.md"
      - ".github/ISSUE_TEMPLATE/issue_template.yml"
      - ".github/ISSUE_TEMPLATE/*.{yml,yaml,md}"
  pull_requests: { scope: auto }
  issues: { scope: auto }

code_generation:
  unit_tests:
    path_instructions:
      - path: "**/service/*.java"
        instructions: >
          Generate unit tests using JUnit5, AssertJ and BDDMockito.
          Focus on core business logic scenarios, including both success and failure (exception) cases.
      - path: "**/controller/*.java"
        instructions: >
          Generate API tests using MockMvc.
          Verify HTTP status codes and response JSON structures.

  docstrings:
    language: "ko-KR"