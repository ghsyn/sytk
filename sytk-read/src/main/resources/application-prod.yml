spring:
  datasource:
    url: ${DB_READ_URL}   # Replica
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: warn
