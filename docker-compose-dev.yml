version: '3.8'

services:
  # infra

  # 1. DB (PostgreSQL)
  sytk-db:
    image: postgres:15
    container_name: sytk-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sytk_dev
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Cache 및 대기열 (Redis)
  sytk-redis:
    image: redis:7-alpine
    container_name: sytk-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. 모듈 간 이벤트 전파 (Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:${CONFLUENT_PLATFORM_VERSION:-7.7.8}
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: [ "CMD", "nc", "-uz", "localhost", "2181" ]
      interval: 10s
      timeout: 5s
      retries: 5

  sytk-kafka:
    image: confluentinc/cp-kafka:${CONFLUENT_PLATFORM_VERSION:-7.7.8}
    container_name: sytk-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://sytk-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9092 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # application
  booking-service:
    build:
      context: .
      dockerfile: sytk-booking/Dockerfile
    container_name: sytk-booking
    ports:
      - "8080:8080"
    depends_on:
      sytk-db:
        condition: service_healthy
      sytk-redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://sytk-db:5432/sytk_dev
      SPRING_DATA_REDIS_HOST: sytk-redis

  payment-service:
    build:
      context: .
      dockerfile: sytk-payment/Dockerfile
    container_name: sytk-payment
    ports:
      - "8081:8081"
    depends_on:
      sytk-db:
        condition: service_healthy
      sytk-kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://sytk-db:5432/sytk_dev
      SPRING_KAFKA_BOOTSTRAP_SERVERS: sytk-kafka:29092

  read-service:
    build:
      context: .
      dockerfile: sytk-read/Dockerfile
    container_name: sytk-read
    ports:
      - "8082:8082"
    depends_on:
      sytk-db:
        condition: service_healthy
      sytk-redis:
        condition: service_healthy
      sytk-kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://sytk-db:5432/sytk_dev
      SPRING_DATA_REDIS_HOST: sytk-redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: sytk-kafka:29092

  waiting-service:
    build:
      context: .
      dockerfile: sytk-waiting/Dockerfile
    container_name: sytk-waiting
    ports:
      - "8083:8083"
    depends_on:
      sytk-redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATA_REDIS_HOST: sytk-redis